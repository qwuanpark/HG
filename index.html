<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=0.25, minimum-scale=0.1, maximum-scale=4, user-scalable=yes">
<style>
  /* On narrow screens (mobile/tablet), scale the whole desktop design down so it fits.
     User can pinch-zoom for detail. */
  @media (max-width: 900px) {
    html { -webkit-text-size-adjust: 100%; }
  }
</style>
<title>해강시스템창호 — Haegang Window Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f4f1ec; color: #1a2332; }
  body { font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Noto Sans KR", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  button { font: inherit; }
  input, textarea { font: inherit; }

  @keyframes hg-scroll-left {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes hg-scroll-right {
    from { transform: translateX(-50%); }
    to { transform: translateX(0); }
  }
  .hg-marquee-row:hover > div { animation-play-state: paused; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="400" fill="#1a2332"/>
    <g transform="translate(120 120)" fill="none" stroke="#b8946a" stroke-width="6">
      <rect x="0" y="0" width="160" height="160"/>
      <line x1="80" y1="0" x2="80" y2="160"/>
      <line x1="0" y1="80" x2="160" y2="80"/>
    </g>
    <text x="200" y="320" text-anchor="middle" fill="#f4f1ec" font-family="serif" font-size="28" font-weight="500">해강시스템창호</text>
    <text x="200" y="350" text-anchor="middle" fill="#b8946a" font-family="serif" font-style="italic" font-size="14" letter-spacing="0.1em">Haegang Window Systems</text>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-rest.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState("home");

  useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [page]);

  const screens = {
    home: <Home setPage={setPage} />,
    about: <About setPage={setPage} />,
    products: <Products setPage={setPage} />,
    projects: <Projects setPage={setPage} />,
    quote: <Quote setPage={setPage} />
  };

  return (
    <div data-screen-label={
      page === "home" ? "01 Home" :
      page === "about" ? "02 About" :
      page === "products" ? "03 Products" :
      page === "projects" ? "04 Projects" : "05 Quote"
    }>
      <PhDefs />
      <Nav page={page} setPage={setPage} dark={false} />
      {screens[page]}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
